name: agent-config-update
description: agent-config-update ワークフロー。ai-manifest リポジトリでの軽量フロー（計画 → 設定整備 → 検証 → 必要時修正）。Cursor / Claude / Codex / Gemini 向けエージェント設定と rulesync 正本（.rulesync/）の整備に限定し、機能実装やテスト実装は対象外とする。
max_steps: 12
initial_step: plan
loop_monitors:
  - cycle:
      - review
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: review
        - condition: 非生産的（同じ指摘が繰り返される）
          next: ABORT
steps:
  - name: plan
    edit: false
    persona: planner
    knowledge:
      - architecture
      - ai-manifest
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: implement
    edit: true
    persona: coder
    policy: coding
    session: refresh
    knowledge:
      - architecture
      - ai-manifest
    required_permission_mode: edit
    instruction: |
      目的: ai-manifest リポジトリのエージェント設定整備を行う。
      対象:
      - `.rulesync/` 正本の修正
      - `.takt/` 配下の設定・ワークフロー定義・ファセット調整
      - 対象外設定ファイル（例: `.claude/settings.json`, `.cursor/mcp.json`）の更新

      非対象:
      - アプリケーション機能の実装
      - テストコードの新規作成・拡張
      - 本番コードのリファクタリング

      実施方針:
      - 変更は最小差分で行い、設定整備に必要な範囲へ限定する。
      - 生成物を直接編集する場合は、正本更新が必要かを先に確認する。
      - 検証は設定整備に必要な確認のみ行う。テスト実装を伴う対応はしない。
    rules:
      - condition: 設定整備の変更が完了
        next: review
      - condition: 変更不要（調査・提案のみ）
        next: review
      - condition: 判断できない、情報不足
        next: ABORT
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: review
    edit: false
    persona: supervisor
    policy: review
    knowledge:
      - architecture
      - ai-manifest
    instruction: |
      設定整備タスクとして、以下を重点確認する:
      - 要求された設定変更が完了しているか
      - 変更が設定整備の範囲に収まっているか
      - 機能実装・テスト実装に逸脱していないか
      - rulesync 正本と生成物の整合性が取れているか

      問題があれば具体的な修正指示を返す。
    rules:
      - condition: 要求達成かつ設定整備の範囲内
        next: COMPLETE
      - condition: 要求未達成、検証・整合性の問題
        next: fix
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
  - name: fix
    edit: true
    persona: coder
    policy: coding
    knowledge:
      - architecture
      - ai-manifest
    required_permission_mode: edit
    instruction: |
      review の指摘に対して、設定整備の範囲でのみ修正する。
      非対象:
      - アプリケーション機能の実装
      - テストコードの追加・修正

      方針:
      - 指摘事項に直結する最小差分で修正する。
      - 仕様解釈が分かれる場合は仮定を明示する。
      - 設定整備の範囲を超える課題は未対応理由として明記する。
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: review
      - condition: 判断できない、情報不足
        next: ABORT

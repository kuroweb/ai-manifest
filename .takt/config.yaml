# TAKT プロジェクト設定：プロバイダー・モデル・persona 割当てなど（リポジトリローカル）

provider: claude
model: sonnet

persona_providers:
  planner:
    provider: claude
    model: sonnet
  coder:
    provider: cursor
    model: composer-2
  ai-antipattern-reviewer:
    provider: codex
    model: gpt-5.3-codex
  architecture-reviewer:
    provider: codex
    model: gpt-5.3-codex
  supervisor:
    provider: codex
    model: gpt-5.3-codex

provider_options:
  codex:
    network_access: true
  claude:
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch

name: ai-manifest
description: ai-manifest 向けワークフロー（計画 → 変更適用 → AIアンチパターンレビュー → 並列レビュー → 完了）。Cursor / Claude / Codex / Gemini 向けのエージェント設定と rulesync 正本（.rulesync/）の整備を主対象とする。
piece_config:
  provider_options:
    codex:
      network_access: true
max_movements: 30
initial_movement: plan
loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）
          next: ABORT
movements:
  - name: plan
    edit: false
    persona: planner
    provider: claude
    knowledge:
      - architecture
      - ai-manifest
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: implement
    edit: true
    persona: coder
    provider: cursor
    policy: coding
    session: refresh
    knowledge:
      - architecture
      - ai-manifest
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: 実装完了
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: ai_review
      - condition: 判断できない、情報不足
        next: ai_review
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    provider: codex
    policy:
      - review
      - ai-antipattern
    knowledge:
      - ai-manifest
    instruction: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review
  - name: ai_fix
    edit: true
    persona: coder
    provider: cursor
    policy: coding
    session: refresh
    knowledge:
      - architecture
      - ai-manifest
    required_permission_mode: edit
    instruction: ai-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: reviewers
      - condition: 修正を進行できない
        next: reviewers
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        provider: codex
        policy: review
        knowledge:
          - architecture
          - ai-manifest
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: supervise
        edit: false
        persona: supervisor
        provider: codex
        policy: review
        instruction: supervise
        rules:
          - condition: すべて問題なし
          - condition: 要求未達成、検証・整合性の問題
        output_contracts:
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
    rules:
      - condition: all("approved", "すべて問題なし")
        next: COMPLETE
      - condition: any("needs_fix", "要求未達成、検証・整合性の問題")
        next: fix
  - name: fix
    edit: true
    persona: coder
    provider: cursor
    policy: coding
    knowledge:
      - architecture
      - ai-manifest
    required_permission_mode: edit
    instruction: fix
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: plan

# --- 読み取りツールの自動許可 (優先度 10) ---
[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 10

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 10

[[rule]]
toolName = "grep_search"
decision = "allow"
priority = 10

[[rule]]
toolName = "glob"
decision = "allow"
priority = 10

[[rule]]
toolName = "cli_help"
decision = "allow"
priority = 10

[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 10

# --- 特定の安全なコマンドのみ自動許可 (優先度 100) ---
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git status"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git diff"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "ls"
decision = "allow"
priority = 100
